# source = ~/.config/hypr/myColors.conf

source = ./base.conf
source = ./binds.conf
source = ./monitors.conf

#windowrule = float on, match:class ^(org.lett.impala)$
#windowrule = size 750 800, move (impala) (100 300), match:class ^(org.lett.impala)$

windowrule {
  name = impala-tui
  match:class = ^(org.lett.impala)$

  float = on
  size = 750 800
}

windowrule {
  name = kitty-zen
  match:float = true
  match:class = kitty
  float = on
  size = 750 800 class:kitty
  move = 100 100
  animation = popin
}

windowrule = opacity 0.9, match:class kitty
